services:
  db:
    image: postgres:16-alpine
    container_name: mat-postgres
    environment:
      POSTGRES_USER: mat
      POSTGRES_PASSWORD: mat
      POSTGRES_DB: meeting_action_tracker
    ports:
      - "5432:5432"
    volumes:
      - mat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mat -d meeting_action_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mat_pgdata:
